# ── Frontend: 401dev.de ──────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 401dev.de www.401dev.de;

    ssl_certificate /etc/letsencrypt/live/401dev.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/401dev.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/edidev/dev/staccato/staccato/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}

# ── Supabase API: api.401dev.de ──────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.401dev.de;

    ssl_certificate /etc/letsencrypt/live/401dev.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/401dev.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:54321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 401dev.de www.401dev.de api.401dev.de;
    return 301 https://$host$request_uri;
}
